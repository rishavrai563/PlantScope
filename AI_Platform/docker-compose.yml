version: '3.8'

services:
  ai_platform:
    build: .
    container_name: plant_disease_ai
    ports:
      - "8000:8000"
    restart: always
    environment:
      - WORKERS_PER_CORE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/openapi.json"]
      interval: 30s
      timeout: 10s
      retries: 3
